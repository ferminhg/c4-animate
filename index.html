<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C4Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e19; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #header { padding: 8px 16px; border-bottom: 1px solid #1e3a5f; display: flex; align-items: center; gap: 12px; }
    #header h1 { font-size: 14px; color: #4a9eff; }
    #toggle-editor { background: none; border: 1px solid #1e3a5f; color: #608ba0; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    #toggle-editor:hover { border-color: #4a9eff; color: #4a9eff; }
    #app { display: flex; flex: 1; overflow: hidden; }
    #editor-panel { width: 320px; min-width: 320px; border-right: 1px solid #1e3a5f; display: flex; flex-direction: column; transition: width 0.2s, min-width 0.2s; }
    #editor-panel.collapsed { width: 0; min-width: 0; overflow: hidden; }
    #editor-panel textarea { flex: 1; background: #0d1f3c; color: #c9d8e8; border: none; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; resize: none; outline: none; line-height: 1.6; }
    #editor-controls { padding: 8px; border-top: 1px solid #1e3a5f; display: flex; gap: 8px; }
    .btn { padding: 6px 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-family: 'Courier New', monospace; }
    .btn-primary { background: #4a9eff; color: #0a0e19; }
    .btn-danger { background: #1e3a5f; color: #ef4444; border: 1px solid #ef4444; }
    #canvas-panel { flex: 1; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #stats { position: absolute; top: 10px; left: 10px; display: flex; gap: 8px; flex-wrap: wrap; pointer-events: none; }
    .stat { background: rgba(13,31,60,0.95); border: 1px solid #4a9eff; border-radius: 6px; padding: 5px 10px; min-width: 80px; }
    .stat-label { font-size: 8px; color: #608ba0; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 16px; font-weight: bold; color: #4a9eff; margin-top: 1px; }
    #legend { position: absolute; bottom: 10px; left: 10px; display: flex; gap: 12px; background: rgba(13,31,60,0.92); padding: 6px 12px; border-radius: 6px; border: 1px solid #1e3a5f; font-size: 10px; pointer-events: none; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    #error-banner { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(239,68,68,0.15); border-top: 1px solid #ef4444; color: #ef4444; font-size: 11px; padding: 6px 12px; display: none; }
    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .control-group label {
      color: #88ccff;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="header">
    <button id="toggle-editor">≡ editor</button>
    <h1>C4Flow</h1>
  </div>
  <div id="app">
    <div id="editor-panel">
      <textarea id="yaml-input" spellcheck="false"></textarea>
      <div id="editor-controls">
        <button class="btn btn-primary" id="btn-play">▶ Play</button>
        <button class="btn btn-danger" id="btn-stop">⏹ Stop</button>
        <div class="control-group">
          <label for="batch-size">Requests per dot:</label>
          <input
            type="number"
            id="batch-size"
            min="1"
            max="1000"
            value="1"
            style="width: 80px; padding: 6px; border: 1px solid #4a9eff; border-radius: 4px; background: #0a0e19; color: #e0e6ed; font-size: 14px;"
          />
        </div>
      </div>
    </div>
    <div id="canvas-panel">
      <canvas id="canvas"></canvas>
      <div id="stats"></div>
      <div id="legend"></div>
      <div id="error-banner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
